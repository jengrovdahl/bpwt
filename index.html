<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F7F4;overflow:hidden;}
input,select,textarea,button{font-family:inherit;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;min-width:220px;background:#1C1917;display:flex;flex-direction:column;overflow:hidden;}
.sh{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.ss{font-size:10px;color:#A8A29E;letter-spacing:0.12em;text-transform:uppercase;margin:0;}
.st{font-size:18px;font-weight:800;color:#FAFAF9;margin:0;letter-spacing:-0.02em;}
.snav{flex:1;overflow-y:auto;padding:8px 0 20px;}

.snav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}
.ni{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;transition:background 0.12s;border:none;background:none;width:100%;text-align:left;}
.ni:hover{background:rgba(255,255,255,0.06);}
.ni.active{background:rgba(255,255,255,0.12);}
.nl{font-size:13px;font-weight:600;color:#E7E5E4;}
.ni.active .nl{color:#fff;}
.nb{font-size:10px;font-weight:800;padding:2px 6px;border-radius:99px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;border-bottom:0.5px solid #E7E5E4;flex-shrink:0;}
.tt{font-size:20px;font-weight:800;color:#1C1917;}
.tm{font-size:12px;color:#A8A29E;margin-top:2px;}
.content{flex:1;overflow-y:auto;padding:16px 20px 40px;}
.sr{display:flex;gap:10px;margin-bottom:16px;}
.sc{flex:1;background:#fff;border:0.5px solid #E7E5E4;border-radius:10px;padding:10px 14px;text-align:center;}
.sn{font-size:22px;font-weight:800;line-height:1;}
.sl{font-size:11px;color:#A8A29E;margin-top:2px;}
.ic{background:#fff;border:0.5px solid #E7E5E4;border-radius:12px;overflow:hidden;margin-bottom:8px;}
.ir{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;}
.ir+.ir{border-top:0.5px solid #F5F5F4;}
.ir.dr{background:#FAFAF9;}
.cb{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ib{flex:1;min-width:0;}
.itn{font-size:14px;font-weight:600;line-height:1.4;margin:0;}
.ino{font-size:12px;color:#78716C;line-height:1.5;margin:4px 0 0;white-space:pre-wrap;}
.im{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;align-items:center;}
.ia{display:flex;gap:2px;flex-shrink:0;}
.ib2{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:#D6D3D1;font-size:14px;}
.di{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:11px;}
.mb{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;display:flex;align-items:flex-end;}
.ms{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px 40px;}
.fl{font-size:11px;font-weight:700;color:#78716C;display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.06em;}
.fi{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #E7E5E4;font-size:14px;color:#1C1917;background:#fff;}
.ft{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #E7E5E4;font-size:14px;color:#1C1917;resize:vertical;}
.hb{display:none;background:none;border:none;cursor:pointer;padding:8px;color:#FAFAF9;font-size:22px;}
.so{display:none;}
@media(max-width:680px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:40;transition:left 0.25s;}
  .sidebar.open{left:0;}
  .so{display:block;position:fixed;inset:0;z-index:39;background:rgba(0,0,0,0.4);}
  .hb{display:block;}
  .topbar{padding:10px 14px;}
}
</style>

async function initMemberTable(){
  await tq(`CREATE TABLE IF NOT EXISTS bpwt_roster (

  // patch: fix Fast Start URLs to use correct per-position forms
  const pfs = await tq("SELECT value FROM cc_meta WHERE key='patch_fast_start_urls'");
  if (!pfs?.rows?.length) {
    // President Fast Start

    // Programming VP Fast Start
    await tq("UPDATE command_center_items SET notes = REPLACE(notes, 'EmailMe form (LPM Fast Start): https://tinyurl.com/SPMFastStart', 'EmailMe form (Programming VP Fast Start): https://www.emailmeform.com/builder/form/tKLJZYw5kO3RWf13') WHERE org='bpwt' AND category='Fast Starts' AND title LIKE '%Programming VP Fast Start%'");

  await tq("INSERT OR IGNORE INTO bpwt_roster (first_name,last_name,email,phone,tri_due,join_date,birthday,active,honor_hold,notes) VALUES (?,?,?,?,?,?,?,0,1,?)",
    ["Debbie","Johnson","dsjohnson9798@gmail.com","507-475-3112","2","1987-10-01","07/25","Past State President — required to retain on roster"]);
  // patch: add convention planning items
  try {
    await tq("CREATE TABLE IF NOT EXISTS cc_meta (key TEXT PRIMARY KEY, value TEXT)");
  } catch(e){}
  const pcv = await tq("SELECT value FROM cc_meta WHERE key='patch_convention_items_v2'");
  if (!pcv?.rows?.length) {
    await tq("DELETE FROM command_center_items WHERE org='bpwt' AND category='Convention'");
    const convItems = [{"category": "Convention", "title": "Submit convention bid to MNWT \u2014 District 8 hosting Annual 2027", "notes": "Bid submitted. Convention dates: May 20-23, 2027, Burnsville MN. Tevyan submitting bid as primary host.\nContract signed June 29, 2026 \u2014 District 8 as LOCAL, MNWT as STATE.", "due_date": "2026-07-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Sign and return MNWT State Meeting Contract", "notes": "Contract must be signed by Host, State President, and Executive Director.\nBid deposit: $150 \u2014 forfeited if obligations not met.\nContact Executive Director Tanya: csc@mnwt.org", "due_date": "2026-07-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Submit budget and action plan to Executive Director for approval", "notes": "Required before any convention donation money is available (max $500 reimbursement if loss).\nBudget must be approved by Executive Director AND FVP.\nBreak-even at approx 70 registrations per MNWT sample budget.\nAll profits stay with District 8 for membership incentives.", "due_date": "2026-09-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Determine and submit registration fee to Executive Director \u2014 due 1 year before", "notes": "Maximum registration fee 2027: $115 per contract.\nSubmit to ED with proposed program by May 2026 (1 year prior).\nLOCAL absorbs cost for: MNWT President, ED, Immediate Past President, up to 2 visiting guests.\nEC members: LOCAL absorbs minus $25 each from State and EC member.", "due_date": "2026-08-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Negotiate and finalize hotel contract with Wyndham Nicollet Inn", "notes": "Address: 14201 Nicollet Ave South, Burnsville MN 55337\nCatering: 952-214-4026 | catering@nicolletinn.com\nKey points to negotiate:\n- Room rental fees and F&B minimums per space\n- 20% service charge + 7.125% food tax on all food\n- Security for events over 100 people ($250/guard)\n- AV equipment: 20% service charge (additional 10% if added day-of)\n- No outside food/beverage except cakes from licensed MN vendors\n- Guest guarantee due 3 business days before by 10am\n- No glitter, confetti, or open flames ($250 cleaning fee)\n- Negotiate: lower-priced lunch item for banquet pricing", "due_date": "2026-10-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Confirm all required meeting rooms are booked May 20-23, 2027", "notes": "Required rooms per MNWT contract:\nTHURSDAY PM: 1 room, conference for 14 (staff meeting)\nFRIDAY AM: 3 breakout rooms for 15 each\nFRIDAY PM: EC Meeting, hollow square for 32 + 10 seats (1-5pm)\nFRIDAY EVE: Key Women (20), Judging/Forums x3 (30 each), Candidate Caucus (40-50 w/head table), Presidents Roundtable (40), Friday Night Party (125, banquet + dance floor + cash bar)\nSATURDAY: Business Meeting/Election theater 150 (8:30am-noon), Luncheon 150, Presidents Roundtable 50, SPM Exchange 25, Banquet 150 (7-10pm, stage + mic + podium)\nSUNDAY: New EC Meeting hollow square 35 (11am-1pm), 3 breakout rooms x15, Staff Exchange 15, Tech Info 15, Staff Meeting 13", "due_date": "2026-10-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Negotiate sleeping room block with Wyndham", "notes": "Required per MNWT contract:\n- Thursday night: 12 rooms\n- Friday night: 85-100 rooms\n- Saturday night: 75 rooms\nMust include handicap-accessible rooms in block.\nLOCAL pays for 3 nights for: MNWT President (suite ~$180/night), MNWT Executive Director (reg room ~$150), MNWT Immediate Past President (reg room), up to 2 visiting guests (max $150 total).\nHold room block until 3 weeks prior to convention.", "due_date": "2026-10-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Confirm AV equipment included in hotel contract", "notes": "Per MNWT contract: LOCAL provides at no cost to STATE:\n- PA system and AV equipment in all rooms\n- Podiums in all rooms\nWyndham charges 20% service charge on AV. Additional 10% if added day-of.\nConfirm what is included vs. extra charge: screens, projectors, microphones, podiums.", "due_date": "2026-10-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Build detailed convention budget \u2014 model at 60, 70, 80, 90 attendees", "notes": "Key expenses per MNWT sample budget:\n- EC lunch: ~$21/person x 24 EC members\n- EC banquet: ~$34/person x 24 EC members\n- Co-chair meals: luncheon + banquet\n- Member lunches: ~$21 x registered count\n- Member banquet: ~$34 x registered count\n- Decorations: ~$200\n- DJ Friday night: ~$300\n- Programs: ~$100\n- President gift: ~$75\n- Room fees: ~$500\n- Bartender banquet: ~$87.50\n- AV/screen: ~$190\n- Hotel rooms for MNWT officers: ~$1,440\nIncome: max $115/person registration + $25/EC member from state after final report.\nBreak-even ~70 registrations. Lose $328 at 60, profit $131 at 70.", "due_date": "2026-09-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Open dedicated convention bank account", "notes": "Keep all convention income and expenses completely separate from chapter accounts.\nTrack: room deposits, catering deposits, DJ deposit, decorations, programs, gifts, registrations.", "due_date": "2026-09-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Build convention committee and assign roles", "notes": "Key roles needed:\n- Registration chair\n- Decorations chair (Friday Night + luncheon/banquet centerpieces)\n- Programs chair\n- Hospitality/First Timers chair\n- Ticket sales chair\n- Hostesses\n- Friday Night Party coordinator\n- Volunteer coordinator\nLOCAL must provide manpower for registration, ticket takers/sellers, sign printers, and hostesses per contract.", "due_date": "2026-11-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Finalize and share Super SHEroes theme with committee", "notes": "Theme already chosen: Super SHEroes.\nTheme doc in Drive includes: color palette, squad themes, Friday night party concept, costume contest, session names, decor ideas, cape templates, ID badges, mission cards, scorecards, comic strip templates.\nShare full theme doc with Tevyan and full committee.", "due_date": "2026-12-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Call hotel to review food and catering options \u2014 December 2026", "notes": "Wyndham menus available (uploaded packet):\n- Continental breakfast: $11.95-$15.95/person\n- Breakfast buffet: $18.95/person\n- Lunch buffets: $18.95-$20.95/person\n- Plated lunches: $18.95-$28.95/person\n- Dinner buffets: $23.95-$40.95/person\n- Plated dinners: $22.95-$45.95/person\nAll prices +20% service charge +7.125% food tax.\nTip: negotiate lower-priced lunch item at banquet price (per MNWT hosting guidelines).", "due_date": "2026-12-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Prepare registration form and promo materials for CIP \u2014 December 2026", "notes": "Ready for inclusion in Chapter Information Packet at prior convention (Winter State).\nMust include: convention dates, location, housing info, hotel name/address/phone/rates, housing coordinator contact.\nSubmit to Executive Director Tanya for approval before distributing.\nAsk ED how many printed copies are needed.", "due_date": "2026-12-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Present convention promo skit at Winter State \u2014 January 2027", "notes": "Per Annual Time Frame: present skit at Winter State to generate excitement and promote registration.\nAlso submit NEWSLET article at same time.\nSkit should be fun and on-theme (Super SHEroes!).", "due_date": "2027-01-31", "assigned_to": "Jen"}, {"category": "Convention", "title": "Find and book Friday Night Party DJ \u2014 January 2027", "notes": "Per Annual Time Frame: start looking for DJ in January.\nDJ budget: ~$300. Must be paid day-of (Friday).\nAll outside entertainers must use hotel loading dock. Hotel must be notified of all entertainment.\nNo liquor service beyond 11:45pm. Bar last call 30 min before agreed end time.\nSecurity required if over 100 people ($250/guard).", "due_date": "2027-01-31", "assigned_to": "Jen"}, {"category": "Convention", "title": "Distribute promo and registration materials in Chapter Mailings \u2014 ask Tanya", "notes": "Per contract: LOCAL may distribute materials electronically via NEWSLET, Key Women newsletter, and Chapter Mailings during the 3 months prior to convention.\nMust be approved by Executive Director before distribution.\nContact: Tanya at csc@mnwt.org", "due_date": "2027-04-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Build volunteer worker list \u2014 March 2027", "notes": "Needed for: registration desk, room monitors, door watchers, table releasers at meals, decoration crew, setup and teardown.\nCoordinate with all committee chairs on their staffing needs.", "due_date": "2027-03-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Work on decorations \u2014 March 2027", "notes": "Items needed:\n- Friday Night Party decorations (Super SHEroes theme)\n- Luncheon table centerpieces\n- Banquet table centerpieces\n- Registration area decorations\n- MNWT Creed Banner (required at business meeting, luncheon, banquet)\n- MN and American flags (required at business meeting, luncheon, banquet)\n- Room signs if not provided by hotel\nIMPORTANT: No glitter, confetti, or open flames \u2014 $250 hotel cleaning fee.\nAll non-professional centerpieces must be inspected by hotel catering manager prior to event.", "due_date": "2027-03-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Shop for MNWT President gift \u2014 March 2027", "notes": "Budget: ~$75 per MNWT sample budget.\nCoordinate with Tevyan. Should be meaningful \u2014 this is a state-level gift.", "due_date": "2027-03-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Design and order First Timer badges \u2014 March 2027", "notes": "Per MNWT contract: LOCAL provides something special to identify First Timers (button, tag, ribbon, etc.).\nThink Super SHEroes theme \u2014 maybe Sidekick badge or Rookie Hero ribbon.\nHave ready by May.", "due_date": "2027-03-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Meet with hotel to finalize all details \u2014 April 2027", "notes": "Items to confirm:\n- Room setups for each session\n- Final catering menu selections and pricing\n- Luncheon and banquet centerpiece/decoration inspection\n- AV setup confirmation\n- Loading dock access for vendors\n- Bar setup and timing for Friday night\n- Guest count guarantee process (3 business days before, 10am)\n- Sleeping room block status", "due_date": "2027-04-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Finalize centerpieces and decorations for luncheon and banquet \u2014 April 2027", "notes": "Per Annual Time Frame: finalize in April.\nAll non-professional decorations must be inspected by hotel catering manager prior to event.\nNo glitter, confetti, or open flames.", "due_date": "2027-04-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "Print meal tickets and convention programs \u2014 May 2027", "notes": "Per Annual Time Frame and contract:\n- Meal tickets for luncheon and banquet\n- Single event tickets must be available (prices set by STATE)\n- Luncheon/banquet tickets at cost + $5 for foundation guests, speakers, state presidents family\n- Convention programs/newsletter (Tanya will have programs \u2014 confirm with her)", "due_date": "2027-05-01", "assigned_to": "Jen"}, {"category": "Convention", "title": "Record all registrations by chapter and track totals", "notes": "Per contract: maintain accurate registration records coordinated with STATE.\nTrack: full convention, partial, single event registrations \u2014 all by chapter.\nRegistration closes at noon on Saturday of the convention.", "due_date": "2027-05-10", "assigned_to": "Jen"}, {"category": "Convention", "title": "Submit guaranteed food counts to Wyndham \u2014 3 business days before", "notes": "Per Wyndham policy: guaranteed guest count due by 10:00am, three business days prior (approx May 17).\nFor Sun-Wed events, guarantee must be provided by preceding Friday.\nOnce confirmed, cannot be reduced. Day-of increases cost an additional 10%.\nHotel uses highest expected number if guarantee not received in time.", "due_date": "2027-05-17", "assigned_to": "Jen"}, {"category": "Convention", "title": "Prepare and distribute convention newsletter/schedule to all attendees", "notes": "Per MNWT contract: LOCAL shall organize, email or print and distribute a newsletter of events to all attendees.\nInclude: full schedule of events, room locations, meal times, party details, First Timer info, theme activities.", "due_date": "2027-05-15", "assigned_to": "Jen"}, {"category": "Convention", "title": "AT CONVENTION \u2014 Thursday May 20: Pre-convention staff meeting at hotel", "notes": "Thursday PM: staff meeting, conference seating for 14.\nTanya (ED) can also coordinate with hotel.\nTouch base with hotel on all room setups.\nStaff arrives Thursday night.", "due_date": "2027-05-20", "assigned_to": "Jen"}, {"category": "Convention", "title": "AT CONVENTION \u2014 Friday May 21: Check rooms, train workers, decorate, DJ", "notes": "Check all room setups throughout the day.\nTrain all workers on their roles.\nDecorate registration area and Friday Night Party space.\nMeet DJ, complete sound check, set up.\nPAY DJ.\nEC Meeting runs 1-5pm.", "due_date": "2027-05-21", "assigned_to": "Jen"}, {"category": "Convention", "title": "AT CONVENTION \u2014 Saturday May 22: Business meeting, luncheon, banquet", "notes": "Check room setups throughout the day.\nGive business meeting welcome (8:30am-noon, theater seating 150).\nSet up luncheon tables (district directors pick tables for their district).\nMeet door watcher for lunch and banquet.\nLunch/banquet programs \u2014 Tanya will have these.\nHave someone release tables at meal time.\nBanquet 7-10pm, small stage, mic, podium.", "due_date": "2027-05-22", "assigned_to": "Jen"}, {"category": "Convention", "title": "AT CONVENTION \u2014 Sunday May 23: New EC meeting, clean up, collapse", "notes": "Check room setups throughout the day.\nNew Executive Council Meeting: 11am-1pm, hollow square for 35.\nSunday breakout rooms x3 for 15 each.\nStaff Exchange and Tech Info sessions.\nClean and pack up everything.\nYou deserve to collapse after this!", "due_date": "2027-05-23", "assigned_to": "Jen"}, {"category": "Convention", "title": "Send thank you notes \u2014 within 2 weeks of convention", "notes": "Send to: Wyndham catering manager, DJ, any speakers, key volunteers, Tevyan, District 8 members who helped.\nAlso write newspaper or newsletter articles about the convention.", "due_date": "2027-06-06", "assigned_to": "Jen"}, {"category": "Convention", "title": "Submit registration breakdown by chapter to Executive Director \u2014 within 60 days", "notes": "REQUIRED per contract. FAILURE TO MEET DEADLINE = FORFEITURE OF BID DEPOSIT.\nDue: within 60 days of May 23, 2027 = approximately July 22, 2027.\nMust include complete breakdown of full, partial, and single event registrations by chapter.", "due_date": "2027-07-22", "assigned_to": "Jen"}, {"category": "Convention", "title": "Submit complete Convention Report Form to Executive Director \u2014 within 60 days", "notes": "REQUIRED per contract. FAILURE TO MEET DEADLINE = FORFEITURE OF BID DEPOSIT.\nDue: approximately July 22, 2027.\nReport includes:\n- Convention name, date, theme, location\n- Goals and whether met\n- Chronological planning steps\n- Day-of activities by committee\n- Post-event activities\n- Attendance list by chapter and event (numbers, not names required)\n- Materials list (quantity, item, purchased/donated, source)\n- Member volunteer hours worked\n- Facility evaluation and recommendation\n- Full budget: all income and expenses, profit/loss\nBid deposit returned upon receipt of complete report.\nForm: Convention Report Form (doc uploaded to Drive).", "due_date": "2027-07-22", "assigned_to": "Jen"}, {"category": "Convention", "title": "Send final convention budget/financial report to CSC", "notes": "After convention: send final budget to CSC showing all actual income and expenses vs. budgeted.\nContact: Tanya at csc@mnwt.org.\nIf convention resulted in a loss, maximum $500 reimbursement available from MNWT convention donation fund.", "due_date": "2027-07-22", "assigned_to": "Jen"}];
    for (const item of convItems) {
      await tq(
        "INSERT INTO command_center_items (org,category,title,notes,due_date,assigned_to,completed) VALUES (?,?,?,?,?,?,0)",
        ["bpwt",item.category,item.title,item.notes||null,item.due_date||null,item.assigned_to||null]
      );
    }
    await tq("INSERT OR REPLACE INTO cc_meta (key,value) VALUES ('patch_convention_items_v2','done')");

async function tq(sql,args=[]){
  const r=await fetch(TURL+"/v2/pipeline",{method:"POST",headers:{Authorization:"Bearer "+TTOK,"Content-Type":"application/json"},
    body:JSON.stringify({requests:[{type:"execute",stmt:{sql,args:args.map(v=>v===null?{type:"null"}:{type:"text",value:String(v)})}},{type:"close"}]}) });
  const d=await r.json();
  if(d.results?.[0]?.type==="error")throw new Error(d.results[0].error.message);
  return d.results?.[0]?.response?.result;
}
function toObj(res){
  if(!res?.rows)return[];
  const cols=res.cols.map(c=>c.name);
  return res.rows.map(row=>{const o={};cols.forEach((c,i)=>{o[c]=row[i]?.value??null;});return o;});
}

// ── Notes renderer — makes URLs clickable ──
function NotesDisplay({ text }) {
  if (!text) return null;
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  const lines = text.split('\n');
  return (
    <p className="ino" style={{whiteSpace:'pre-wrap'}}>
      {lines.map((line, li) => {
        const parts = line.split(urlRegex);
        return (
          <span key={li}>
            {li > 0 && '\n'}
            {parts.map((part, pi) =>
              /^https?:\/\//.test(part)
                ? <a key={pi} href={part} target="_blank" rel="noopener noreferrer"
                    style={{color:'#7C3AED',textDecoration:'underline',wordBreak:'break-all'}}
                    onClick={e=>e.stopPropagation()}>{part}</a>
                : part
            )}
          </span>
        );
      })}
    </p>
  );
}

function MemberTracker({ item, orgColor }) {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const loadRows = React.useCallback(async () => {
    setLoading(true);
    try {
      for (const m of MEMBERS) {
        await tq("INSERT OR IGNORE INTO member_completions (item_id,member_name,completed) VALUES (?,?,0)",[item.id,m]);
      }
      const r = await tq("SELECT * FROM member_completions WHERE item_id=? ORDER BY id ASC",[item.id]);
      if (r?.rows) {
        const cols=r.cols.map(c=>c.name);
        setRows(r.rows.map(row=>{const o={};cols.forEach((c,i)=>{o[c]=row[i]?.value??null;});return o;}));
      }
    } finally { setLoading(false); }
  },[item.id]);
  React.useEffect(()=>{loadRows();},[loadRows]);
  const toggle=async(row)=>{
    const nv=(row.completed==="1"||row.completed===1)?0:1;
    const nd=nv?new Date().toISOString().split("T")[0]:null;
    setRows(p=>p.map(r=>r.member_name===row.member_name?{...r,completed:nv,completed_date:nd}:r));
    await tq("UPDATE member_completions SET completed=?,completed_date=? WHERE item_id=? AND member_name=?",[String(nv),nd,item.id,row.member_name]);
  };
  const setDate=async(row,date)=>{
    setRows(p=>p.map(r=>r.member_name===row.member_name?{...r,completed_date:date||null}:r));
    await tq("UPDATE member_completions SET completed_date=? WHERE item_id=? AND member_name=?",[date||null,item.id,row.member_name]);
  };
  if(loading)return<p style={{fontSize:11,color:"#A8A29E",padding:"8px 0"}}>Loading…</p>;
  const doneCount=rows.filter(r=>r.completed==="1"||r.completed===1).length;
  return(
    <div style={{marginTop:10,borderTop:"0.5px solid #F5F5F4",paddingTop:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <p style={{fontSize:11,fontWeight:700,color:"#A8A29E",textTransform:"uppercase",letterSpacing:"0.06em",margin:0}}>Member tracking</p>
        <span style={{fontSize:11,fontWeight:700,color:orgColor}}>{doneCount}/{rows.length} completed</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {rows.map(row=>{
          const dn=row.completed==="1"||row.completed===1;
          return(
            <div key={row.member_name} style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>toggle(row)} style={{width:18,height:18,borderRadius:4,flexShrink:0,cursor:"pointer",border:"2px solid "+(dn?orgColor:"#D6D3D1"),background:dn?orgColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {dn&&<span style={{color:"#fff",fontSize:10,fontWeight:900,lineHeight:1}}>✓</span>}
              </button>
              <span style={{fontSize:13,fontWeight:500,color:dn?"#A8A29E":"#1C1917",width:72,flexShrink:0,textDecoration:dn?"line-through":"none"}}>{row.member_name}</span>
              <input type="date" value={row.completed_date||""} onChange={e=>setDate(row,e.target.value)}
                style={{fontSize:11,padding:"2px 6px",borderRadius:6,border:"1px solid #E7E5E4",color:row.completed_date?"#78716C":"#C4B5A0",background:dn?"#F5F5F4":"#fff",flex:1,maxWidth:140}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function LevelBadge({ item, saveField }) {
  const LEVELS = ["LOCAL","MNWT","USWT"];
  const LEVEL_COLORS = {
    "LOCAL": { bg:"#EDE9FE", text:"#5B21B6" },
    "MNWT":  { bg:"#DBEAFE", text:"#1E40AF" },
    "USWT":  { bg:"#D1FAE5", text:"#065F46" },
  };
  const current = item.level || getLevel(item);
  const cycle = async (e) => {
    e.stopPropagation();
    const next = LEVELS[(LEVELS.indexOf(current) + 1) % LEVELS.length];
    await saveField(item.id, "level", next);
  };
  const lc = LEVEL_COLORS[current] || LEVEL_COLORS["LOCAL"];
  return (
    <span onClick={cycle} title="Tap to change level" style={{
      fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:4,
      background:lc.bg,color:lc.text,flexShrink:0,marginTop:2,
      letterSpacing:"0.06em",cursor:"pointer",userSelect:"none",
      border:"1px solid transparent",transition:"opacity 0.15s"
    }}>{current}</span>
  );
}

function getLevel(item) {
  if (item.level) return item.level;
  const cat = item.category || "";
  const title = item.title || "";
  const notes = item.notes || "";
  // USWT items
  if (title.includes("USWT") || notes.includes("USWT") || 
      title.includes("WPD") || title.includes("STEP I") || title.includes("STEP II") || title.includes("STEP III") ||
      title.includes("Friendship Day") || title.includes("Founders Day") ||
      title.includes("Outstanding Achievement in Programming") ||
      title.includes("All American") || title.includes("Fellowship Builder") ||
      title.includes("Ambassador Award") || title.includes("uswomenoftoday")) {
    return "USWT";
  }
  // LOCAL items
  if (cat === "Convention" || cat === "District Secretary" || cat === "Roster" ||
      title.includes("chapter") || title.includes("Chapter") ||
      title.includes("BPWT") || title.includes("District") ||
      title.includes("Tevyan") || title.includes("Wyndham") ||
      title.includes("hotel") || title.includes("Hotel") ||
      title.includes("chapter social") || title.includes("m-event") ||
      title.includes("AT CONVENTION") || title.includes("Post-convention") ||
      cat === "Blossom Thyme" || cat === "Home" || cat === "Personal Goals" ||
      cat === "Health & Wellness" || cat === "Projects" || cat === "Errands") {
    return "LOCAL";
  }
  // MNWT items — state-level
  if (cat === "Fast Starts" || cat === "President" || cat === "Programming VP" ||
      cat === "Membership VP" || cat === "Secretary" || cat === "Treasurer" ||
      cat === "State Delegate" || cat === "Parliamentarian" || cat === "Future Directions" ||
      title.includes("MNWT") || title.includes("SUCCESS") ||
      title.includes("trimester report") || title.includes("Trimester Report") ||
      title.includes("Fast Start") || title.includes("state president") ||
      notes.includes("mnwt.org") || notes.includes("emailmeform")) {
    return "MNWT";
  }
  return "LOCAL";
}

function applyFilters(items, filters) {
  if (!filters) return items;
  return items.filter(item => {
    const done = item.completed==="1"||item.completed===1;
    const wd   = item.wont_do==="1"||item.wont_do===1;
    // status
    if ((filters.statuses||[]).length > 0) {
      const match =
        (filters.statuses.includes("open")      && !done && !wd) ||
        (filters.statuses.includes("done")      && done) ||
        (filters.statuses.includes("won\'t do") && wd);
      if (!match) return false;
    }
    // overdue
    if (filters.overdue && !(item.due_date && new Date(item.due_date+"T23:59:59") < new Date())) return false;
    // date range
    if (filters.dateFrom && item.due_date && item.due_date < filters.dateFrom) return false;
    if (filters.dateTo   && item.due_date && item.due_date > filters.dateTo)   return false;
    if (filters.dateFrom && !item.due_date) return false;
    // level
    if ((filters.levels||[]).length > 0) {
      const lvl = item.level || getLevel(item);
      if (!filters.levels.includes(lvl)) return false;
    }
    // assigned to
    if (filters.unassigned && item.assigned_to) return false;
    if ((filters.assignees||[]).length > 0 && !filters.assignees.includes(item.assigned_to)) return false;
    return true;
  });
}

                  <APicker value={item.assigned_to} onChange={v=>sf(item.id,"assigned_to",v)}/>
                </div>}
                {!isN&&wontdo(item.wont_do)&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:4}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#DC2626"}}>✕</span>
                  <span style={{fontSize:11,color:"#FCA5A5",fontWeight:500}}>Won't do</span>
                </div>}
                {!isN&&dn&&<div className="di">
                  <span style={{color:CLR,fontWeight:700}}>✓</span>
                  {item.completed_by&&<span style={{fontWeight:600,color:"#78716C"}}>{item.completed_by}</span>}
                  {item.completed_at&&<span style={{color:"#A8A29E"}}>· {fdt(item.completed_at)}</span>}
                </div>}
                {isN&&<p style={{fontSize:11,color:"#A8A29E",fontStyle:"italic",marginTop:4}}>Edit notes to record who was nominated and when</p>}
              </div>
              <div className="ia">
                {!dn&&<button className="ib2" onClick={()=>oE(item)}>✏️</button>}
                <button className="ib2" onClick={()=>di(item.id)}>🗑</button>
              </div>
            </div>;})}
          </div>)}
      </div>
    </main>
    {showFilters&&<FilterPanel
        org={ORG}
        items={items}
        filters={filters}
        setFilters={setFilters}
        onClose={()=>setShowFilters(false)}
        color={CLR}
        people={PPL||[]}
      />}
    {modal?.mode==="complete"&&<div className="mb" onClick={e=>e.target===e.currentTarget&&cm()}>
      <div className="ms">
        <p style={{fontSize:12,color:"#A8A29E",margin:"0 0 4px",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700}}>Marking complete</p>
        <p style={{fontSize:15,fontWeight:700,color:"#1C1917",margin:"0 0 20px",lineHeight:1.3}}>{modal.item.title}</p>
        <label className="fl">Who completed this?</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
          {PPL.map(p=><button key={p} onClick={()=>setCby(p)}
            style={{padding:"7px 14px",borderRadius:99,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:cby===p?CLR:LGT,color:cby===p?"#fff":"#555"}}>{p}</button>)}
        </div>
        <input value={cby} onChange={e=>setCby(e.target.value)} placeholder="Or type a name…" className="fi" style={{marginBottom:16}}/>
        <div style={{display:"flex",gap:10}}>
          <button onClick={cm} style={{flex:1,padding:"13px",borderRadius:12,border:"1.5px solid #E7E5E4",background:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",color:"#78716C"}}>Cancel</button>
          <button onClick={cc} style={{flex:2,padding:"13px",borderRadius:12,border:"none",background:CLR,color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer"}}>✓ Mark complete{cby?" — "+cby:""}</button>
        </div>
      </div>
    </div>}
    {(modal?.mode==="add"||modal?.mode==="edit")&&<div className="mb" onClick={e=>e.target===e.currentTarget&&cm()}>
      <div className="ms">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#1C1917"}}>{modal.mode==="edit"?"Edit":"New item"}</h2>
          <button onClick={cm} style={{background:"#F5F5F4",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14,color:"#78716C",fontWeight:600}}>Cancel</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div><label className="fl">Category</label>
            <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} className="fi">
              {CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label className="fl">Title *</label>
            <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="What needs to happen?" className="fi"/></div>
          <div><label className="fl">Notes</label>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Details…" rows={3} className="ft"/></div>
          <div style={{display:"flex",gap:12}}>
            <div style={{flex:1}}>
              <label className="fl">Due date</label>
              <input type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))} className="fi"/></div>
            <div style={{flex:1}}>
              <label className="fl">Assigned to</label>
              <input value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))} placeholder="Name" className="fi"/></div>
          </div>
          <button onClick={si} disabled={saving||!form.title.trim()}
            style={{background:CLR,color:"#fff",border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:800,cursor:"pointer",opacity:saving||!form.title.trim()?0.5:1}}>
            {saving?"Saving…":modal.mode==="edit"?"Save changes":"Add item"}</button>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
